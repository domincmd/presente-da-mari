<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>terminal</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/calculator.css">
</head>
<body>
    <div class="main-container">
        <div class="input-container">
            <div class="input"></div>
        </div>
        <div class="button-container">
            <div class="button" onclick="clickedDigit(this)">1</div>
            <div class="button" onclick="clickedDigit(this)">2</div>
            <div class="button" onclick="clickedDigit(this)">3</div>
            <div class="button" onclick="clickedDigit(this)">+</div>
            <div class="button" onclick="clickedDigit(this)">4</div>
            <div class="button" onclick="clickedDigit(this)">5</div>
            <div class="button" onclick="clickedDigit(this)">6</div>
            <div class="button" onclick="clickedDigit(this)">-</div>
            <div class="button" onclick="clickedDigit(this)">7</div>
            <div class="button" onclick="clickedDigit(this)">8</div>
            <div class="button" onclick="clickedDigit(this)">9</div>
            <div class="button" onclick="clickedDigit(this)">*</div>
            <div class="button" onclick="clickedDigit(this)">C</div>
            <div class="button" onclick="clickedDigit(this)">0</div>
            <div class="button" onclick="clickedDigit(this)">=</div>
            <div class="button" onclick="clickedDigit(this)">/</div>
        </div>
    </div>
</body>
<script src="../scripts/calculator.js"></script>
</html>
